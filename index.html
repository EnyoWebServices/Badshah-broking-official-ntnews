    display:flex;

/* 💎 GLASS */
.container {
    max-width:420px;
    width:100%;
    margin:15px;
    padding:15px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);

/* 🔴 LIVE */
.live {
    position:absolute;
    top:8px;
    left:10px;
    font-size:12px;
    color:red;
    font-weight:bold;
    animation:blink 1s infinite;
}

/* 👀 VIEWERS */
.viewers {
    position:absolute;
    top:8px;
    right:10px;
    font-size:11px;
    color:#0f0;
}

/* 🔁 MARQUEE */
.marquee {
    overflow:hidden;
    white-space:nowrap;
    font-size:12px;
    color:#00ff88;
}
.marquee div {
    display:inline-block;
    padding-left:100%;
    animation:marquee 15s linear infinite;
}
@keyframes marquee {
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

/* 👑 PROFILE */
.profile img {
    width:95px;
    height:95px;
    border-radius:50%;
    border:3px solid gold;
    box-shadow:0 0 20px gold;
}

.king {
    position:absolute;

    right:0;
    background:gold;
    border-radius:50%;

    font-weight:700;
    color:gold;

}

.sub {

}

/* 🔢 COUNTER */
.counter {
    font-size:14px;
    margin:10px 0;
}

/* 🧠 TEXT */
.desc {
    font-size:13px;
    line-height:1.7;
}
.highlight {
    color:#ffd700;
    font-weight:700;
}

/* 🚀 CTA */
.cta button {
    width:95%;
    padding:14px;
    font-size:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#ff2e2e,#ff6b6b);
    color:#fff;
    font-weight:bold;
    animation:glow 1.5s infinite alternate;
}
@keyframes glow {
    from{box-shadow:0 0 10px red;}
    to{box-shadow:0 0 30px red;}
}

/* 📌 STICKY CTA */
.sticky {
    position:fixed;
    bottom:0;
    width:100%;
    max-width:420px;
}
.sticky button {
    width:100%;
    padding:15px;
    border:none;
    background:red;
    color:#fff;
    font-size:16px;

/* 💰 POPUP */
.popup {
    position:fixed;
    bottom:80px;
    left:10px;
    background:#111;
    padding:10px;
    border-radius:10px;
    font-size:12px;
    display:none;
}

/* ⚠️ DISCLAIMER */
.disclaimer {
    font-size:10px;
    margin-top:10px;

</style>
